<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProjectARK · Pré-dimensionamento de Equipamentos</title>
<style>
  :root{
    --navy:#0E1B2E; --navy2:#16263d; --navy3:#1d3047;
    --teal:#1E9BC4; --teal-d:#16789a; --gold:#D9A94A;
    --bg:#eef1f4; --card:#ffffff; --ink:#1c2733; --muted:#5f6b78; --line:#d7dde3;
    --ok:#2e8b4f; --okbg:#e7f4ec;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  a{color:var(--teal-d)}
  header{position:sticky;top:0;z-index:40;background:#0e1b2e;border-bottom:3px solid var(--gold);padding:7px 18px;display:flex;align-items:center;gap:18px}
  .emblem{height:58px;display:block;flex:none}
  .wm .l1{font-size:1.32rem;font-weight:800;line-height:1.08;letter-spacing:.2px}
  .wm .l1 .p{color:#f4f7fa}.wm .l1 .a{color:#1E9BC4}.wm .l1 .e{color:#D9A94A}
  .wm .l2{font-size:.72rem;letter-spacing:.13em;text-transform:uppercase;color:#1E9BC4;margin-top:2px}
  .burger{display:none;background:var(--navy2);border:1px solid var(--navy3);color:#fff;width:40px;height:40px;border-radius:7px;font-size:1.2rem;cursor:pointer;flex:none}
  .brand{display:flex;align-items:center;gap:13px}
  .brand .mark{width:42px;height:42px;flex:none}
  .brand .t1{font-size:1.25rem;font-weight:800}
  .brand .t1 .p{color:#f4f7fa}.brand .t1 .a{color:var(--teal)}
  .brand .t2{font-size:.62rem;letter-spacing:.26em;color:var(--gold);font-weight:600}
  .htag{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:#9fb2c4;font-size:.72rem;text-align:right}
  .layout{display:flex;align-items:flex-start;max-width:1400px;margin:0 auto}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;z-index:30}
  .overlay.open{display:block}
  aside{width:264px;flex:none;background:#fff;border-right:1px solid var(--line);min-height:calc(100vh - 65px);padding:14px 0}
  aside h2{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 16px 8px}
  .navitem{display:block;width:100%;text-align:left;background:none;border:none;color:var(--ink);padding:8px 16px;cursor:pointer;font-size:.9rem;border-left:3px solid transparent}
  .navitem.all{font-weight:700}
  .navitem:hover{background:#f1f5f8;color:var(--teal-d)}
  .navitem.active{background:#eaf4f8;color:var(--teal-d);border-left-color:var(--gold);font-weight:600}
  .grphead{display:flex;justify-content:space-between;align-items:center;width:100%;background:none;border:none;color:var(--ink);padding:10px 16px;cursor:pointer;font-size:.92rem;font-weight:700;border-left:3px solid transparent}
  .grphead:hover{background:#f1f5f8}
  .grp.active>.grphead{border-left-color:var(--gold);color:var(--teal-d)}
  .grp.open .arrow{transform:rotate(90deg)}
  .arrow{color:var(--muted);transition:.15s;font-size:.8rem}
  .subs{display:none}.grp.open .subs{display:block}
  .subs .navitem{padding-left:34px;font-size:.85rem;color:var(--muted)}
  .subs .navitem.active{color:var(--teal-d)}
  main{flex:1;min-width:0;padding:0 20px 60px}
  .crumb{padding:14px 2px 6px;color:var(--muted);font-size:.82rem}
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:6px 2px 16px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .toolbar h1{font-size:1.25rem;margin:0;flex:1;min-width:200px}
  .count{color:var(--muted);font-size:.84rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;cursor:pointer;transition:.15s;display:flex;gap:12px;align-items:flex-start}
  .card:hover{border-color:var(--teal);box-shadow:0 4px 14px rgba(14,27,46,.08);transform:translateY(-2px)}
  .card .icon{width:46px;height:46px;flex:none;color:var(--navy);background:#eef4f8;border:1px solid var(--line);border-radius:8px;padding:7px}
  .card .cat{font-size:.66rem;letter-spacing:.04em;text-transform:uppercase;color:var(--teal-d);font-weight:700}
  .card h3{margin:2px 0 4px;font-size:1.02rem}
  .card .desc{color:var(--muted);font-size:.82rem}
  .card .calcflag{display:inline-block;margin-top:7px;font-size:.68rem;font-weight:700;color:var(--teal-d);background:#e8f5fa;border:1px solid #bfe3f0;border-radius:20px;padding:2px 8px}
  .card .calcflag.soon{color:#8a6d1f;background:#fbf3df;border-color:#ecd9a6}

  .modal{position:fixed;inset:0;background:rgba(14,27,46,.55);display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto;z-index:50}
  .modal.open{display:flex}
  .sheet{background:#fff;border:1px solid var(--line);border-radius:12px;max-width:880px;width:100%;padding:0;overflow:hidden}
  .sheet .head{background:var(--navy);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:12px}
  .sheet .head .ic{width:40px;height:40px;color:var(--gold)}
  .sheet .head h2{margin:0;font-size:1.2rem}
  .sheet .head .sub{color:#9fb2c4;font-size:.82rem}
  .sheet .head .close{margin-left:auto;background:none;border:none;color:#9fb2c4;font-size:1.7rem;cursor:pointer;line-height:1}
  .calcbody{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .inputs{padding:20px 24px;border-right:1px solid var(--line)}
  .results{padding:20px 24px;background:#f7f9fb}
  .sec-t{font-size:.74rem;text-transform:uppercase;letter-spacing:.05em;color:var(--teal-d);font-weight:700;margin:0 0 12px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:4px}
  .fhead{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--teal-d);font-weight:700;margin:18px 0 8px;border-bottom:1px solid var(--line);padding-bottom:3px}
  .field .u{color:#9aa6b2;font-weight:400}
  .field input,.field select{width:100%;border:1px solid var(--line);border-radius:7px;padding:9px 10px;font-size:.92rem;color:var(--ink);background:#fff}
  .field input:focus,.field select:focus{outline:2px solid var(--teal)}
  .btn{width:100%;margin-top:6px;background:var(--teal);color:#fff;border:none;border-radius:8px;padding:11px;font-size:.95rem;font-weight:700;cursor:pointer}
  .btn:hover{background:var(--teal-d)}
  .btn2{background:#fff;color:var(--teal-d);border:1px solid var(--teal);margin-top:8px}
  .btn2:hover{background:#eef7fb}
  .vid{margin-top:18px;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:#0e1b2e}
  .vid svg{width:100%;height:auto;display:block}
  .vid .cap{color:#9fb2c4;font-size:.72rem;text-align:center;padding:7px 8px;border-top:1px solid #22344a}
  table.res{width:100%;border-collapse:collapse;font-size:.9rem}
  table.res td{padding:8px 6px;border-bottom:1px solid var(--line);vertical-align:top}
  table.res td.k{color:var(--muted)}
  table.res td.v{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
  .highlight td{background:#eef9f1}
  .highlight td.v{color:var(--ok)}
  .placeholder{color:var(--muted);font-size:.9rem;text-align:center;padding:30px 10px}
  .note{font-size:.76rem;color:var(--muted);margin-top:14px;border-top:1px dashed var(--line);padding-top:10px}
  footer{background:var(--navy);color:#9fb2c4;font-size:.8rem;padding:16px 20px;text-align:center;border-top:3px solid var(--gold)}
  @media(max-width:900px){.burger{display:block}.emblem{height:46px}.wm .l1{font-size:1.05rem}.wm .l2{font-size:.62rem}aside{position:fixed;top:72px;left:0;height:calc(100% - 72px);transform:translateX(-100%);transition:.22s;z-index:35}aside.open{transform:translateX(0)}.htag{display:none}.calcbody{grid-template-columns:1fr}.inputs{border-right:none;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<header>
  <button class="burger" id="burger">☰</button>
  <div class="brand">
    <img class="emblem" src="logo1.png.png?v=2" alt="ProjectArk" />
    <div class="wm">
      <div class="l1"><span class="p">Project</span><span class="a">ARK</span> <span class="e">Engenharia</span></div>
    </div>
  </div>
  <div class="htag" id="htag"></div>
</header>

<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside id="drawer">
    <h2>Equipamentos</h2>
    <button class="navitem all active" data-all="1">Todos</button>
    <div id="menu"></div>
  </aside>
  <main>
    <div class="toolbar"><h1 id="title">Dimensionamento de Equipamentos</h1><span class="count" id="count"></span></div>
    <div class="grid" id="grid"></div>
  </main>
</div>
<footer id="foot">ProjectARK · Pré-dimensionamento de Equipamentos</footer>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>
let DB={meta:{},equipamentos:[]};
let curGrupo="",curSub="",CUR_EQ=null;
const REPORT_LOGO=new Image(); REPORT_LOGO.src="logo2.png";
const $=s=>document.querySelector(s);
const ICON_SCREW='<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="6" y="18" width="36" height="12" rx="6"/><path d="M10 24c3-5 6 5 9 0s6 5 9 0 6 5 9 0"/></svg>';
const ICON_BELT='<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="13" cy="28" r="6"/><circle cx="35" cy="28" r="6"/><path d="M13 22 H35 M13 34 H35"/><path d="M18 18 l4 4 4-4" /></svg>';
const ICON_FLEX='<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="35" r="5"/><circle cx="37" cy="13" r="5"/><path d="M12 30 L37 8 M12 40 L37 18"/><path d="M22 31 l3 4 4-3"/></svg>';
const ICON_SILO='<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 16 v20 M34 16 v20"/><path d="M14 16 a10 5 0 0 1 20 0"/><path d="M14 36 l10 8 10 -8"/><path d="M19 16 v20 M24 16 v22 M29 16 v20"/></svg>';
const ICON_TUBE='<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="6" y="32" width="14" height="9" rx="4.5"/><rect x="28" y="9" width="14" height="9" rx="4.5" transform="rotate(32 35 13.5)"/><path d="M16 34 L30 18"/><circle cx="11" cy="36.5" r="1.6" fill="currentColor"/><circle cx="20" cy="29" r="1.6" fill="currentColor"/><circle cx="28" cy="20" r="1.6" fill="currentColor"/></svg>';
const ICON_BUCKET='<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M16 8 v32 M32 8 v32"/><path d="M16 14 h7 a4 4 0 0 1 4 4 v3 h-11 z"/><path d="M16 26 h7 a4 4 0 0 1 4 4 v3 h-11 z"/><path d="M32 18 h6 a4 4 0 0 1 4 4 v3 h-10 z"/></svg>';
const ICON_JAW='<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 10 L18 30 L18 38"/><path d="M38 10 L26 30 L26 38"/><path d="M10 10 L38 10"/><circle cx="14" cy="20" r="1.6" fill="currentColor"/><circle cx="24" cy="16" r="1.6" fill="currentColor"/><circle cx="34" cy="20" r="1.6" fill="currentColor"/></svg>';
const ICON_IMPACT='<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="24" cy="26" r="11"/><path d="M24 26 L24 17 M24 26 L32 31 M24 26 L16 31"/><path d="M22 8 h4 v6 h-4 z"/><path d="M40 24 l4 -2 M40 30 l4 2 M8 24 l-4 -2"/></svg>';
const ICON_HAMMER='<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="24" cy="22" r="10"/><circle cx="24" cy="22" r="2.4" fill="currentColor"/><path d="M24 12 l5 -5 M24 32 l-5 5 M34 22 l5 -5 M14 22 l-5 5"/><path d="M12 40 h24 M14 40 v-2 M20 40 v-2 M26 40 v-2 M32 40 v-2"/></svg>';
const ICON_SCREEN_H='<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="6" y="14" width="36" height="9" rx="2"/><rect x="6" y="27" width="36" height="9" rx="2"/><path d="M12 14 v9 M18 14 v9 M24 14 v9 M30 14 v9 M36 14 v9" stroke-width="1.2"/><path d="M12 27 v9 M18 27 v9 M24 27 v9 M30 27 v9 M36 27 v9" stroke-width="1.2"/><path d="M8 40 l4 -2 M40 40 l-4 -2"/></svg>';
const CRUSHER_MAT={calcario:11,minerio_ferro:13,granito:16,basalto:19,quartzito:12,gnaisse:15,dolomita:11,bauxita:9,minerio_cobre:14,carvao:11,concreto:10,arenito:8,gesso:7,cal:9};
/* Densidade aparente típica (t/m³) para peneiramento */
const SCREEN_MAT={brita:1.6,granito:1.6,calcario:1.5,minerio_ferro:2.5,carvao:0.9,areia:1.5,agregado:1.6,coque:0.5};
function penPreset(){var d=SCREEN_MAT[$("#pnMat").value]; if(d==null)return; $("#pnRho").value=d; runCalc(CUR_EQ&&CUR_EQ.calculadora?CUR_EQ.calculadora:"peneira_horizontal");}
function crusherPreset(){var w=CRUSHER_MAT[$("#bjMat").value]; if(w==null)return; $("#bjWi").value=w; runCalc(CUR_EQ&&CUR_EQ.calculadora?CUR_EQ.calculadora:"britador_mandibulas");}
function impactPreset(){var w=CRUSHER_MAT[$("#biMat").value]; if(w==null)return; $("#biWi").value=w; runCalc(CUR_EQ&&CUR_EQ.calculadora?CUR_EQ.calculadora:"britador_impacto");}
function hammerPreset(){var w=CRUSHER_MAT[$("#bhMat").value]; if(w==null)return; $("#bhWi").value=w; runCalc(CUR_EQ&&CUR_EQ.calculadora?CUR_EQ.calculadora:"britador_martelo");}
function icon(e){if(e&&e.calculadora==="peneira_horizontal")return ICON_SCREEN_H;if(e&&e.calculadora==="britador_martelo")return ICON_HAMMER;if(e&&e.calculadora==="britador_impacto")return ICON_IMPACT;if(e&&e.calculadora==="britador_mandibulas")return ICON_JAW;if(e&&e.calculadora==="elevador_canecas")return ICON_BUCKET;if(e&&e.calculadora==="arraste_tubular")return ICON_TUBE;if(e&&e.grupo==="Silos")return ICON_SILO;if(e&&e.calculadora==="belt_conveyor")return ICON_BELT;if(e&&e.calculadora==="flexowell")return ICON_FLEX;return ICON_SCREW;}

/* ---------- Registro de calculadoras ---------- */
const DIAM_STD=[100,150,200,250,300,350,400,450,500,600,700,800,900,1000];
function nextStd(mm){for(const d of DIAM_STD){if(d>=mm)return d;}return DIAM_STD[DIAM_STD.length-1];}
function num(id){return parseFloat($("#"+id).value);}
/* Pré-seleção de materiais típicos de mineração (valores representativos de literatura — confirmar em ensaio Jenike Shear) */
const SILO_MAT={
  fe_gran:{rho:2.5,phi:35,delta:25,c:0.3,d50:12},
  fe_fino:{rho:2.6,phi:42,delta:28,c:2.0,d50:0.1},
  pelota:{rho:2.3,phi:32,delta:22,c:0,d50:12},
  sinter:{rho:1.8,phi:38,delta:30,c:0.2,d50:20},
  carvao:{rho:0.9,phi:45,delta:30,c:1.5,d50:6},
  carvao_seco:{rho:0.8,phi:38,delta:25,c:0.2,d50:6},
  coque:{rho:0.5,phi:40,delta:30,c:0.3,d50:25},
  calcario:{rho:1.5,phi:38,delta:28,c:0.5,d50:10}
};
function siloPreset(){
  var p=SILO_MAT[$("#siMat").value]; if(!p) return;
  $("#siRho").value=p.rho; $("#siPhi").value=p.phi; $("#siDelta").value=p.delta; $("#siCoes").value=p.c; $("#siD50").value=p.d50;
  runCalc(CUR_EQ&&CUR_EQ.calculadora?CUR_EQ.calculadora:"silo_circular");
}

/* ---------- Tabela de referência SEW (motores DRN 4 polos + redutores série R) ---------- */
const SEW_MOTORS=[
 {kw:0.12,d:"DRN63M4"},{kw:0.18,d:"DRN63L4"},{kw:0.25,d:"DRN71S4"},{kw:0.37,d:"DRN71M4"},
 {kw:0.55,d:"DRN80S4"},{kw:0.75,d:"DRN80M4"},{kw:1.1,d:"DRN90S4"},{kw:1.5,d:"DRN90L4"},
 {kw:2.2,d:"DRN100L4"},{kw:3.0,d:"DRN100LC4"},{kw:4.0,d:"DRN112M4"},{kw:5.5,d:"DRN132S4"},
 {kw:7.5,d:"DRN132M4"},{kw:11,d:"DRN160M4"},{kw:15,d:"DRN160L4"},{kw:18.5,d:"DRN180M4"},
 {kw:22,d:"DRN180L4"},{kw:30,d:"DRN200L4"},{kw:37,d:"DRN225S4"},{kw:45,d:"DRN225M4"},
 {kw:55,d:"DRN250M4"},{kw:75,d:"DRN280S4"},{kw:90,d:"DRN280M4"},{kw:110,d:"DRN315S4"},
 {kw:132,d:"DRN315M4"},{kw:160,d:"DRN315L4"},{kw:200,d:"DRN355M4"}];
const SEW_R=[
 {s:"R17",t:130},{s:"R27",t:200},{s:"R37",t:300},{s:"R47",t:450},{s:"R57",t:600},
 {s:"R67",t:820},{s:"R77",t:1300},{s:"R87",t:2000},{s:"R97",t:3300},{s:"R107",t:4900},
 {s:"R137",t:8000},{s:"R147",t:13000},{s:"R167",t:18000}];
const N_MOTOR=1750, FB=1.4;
function fmt(x){return x.toLocaleString("pt-BR");}
function selSEW(Pdrive,nout){
  const T=9550*Pdrive/nout;                 // torque no eixo de saída (Nm)
  const Tsel=T*FB;                          // torque de seleção (com fator de serviço)
  const mot=SEW_MOTORS.find(m=>m.kw>=Pdrive)||SEW_MOTORS[SEW_MOTORS.length-1];
  const red=SEW_R.find(g=>g.t>=Tsel)||SEW_R[SEW_R.length-1];
  return {T,Tsel,mot,red,i:N_MOTOR/nout};
}

const CALCS={
  screw_conveyor:{
    titulo:"Transportador Helicoidal — pré-dimensionamento",
    referencia:"CEMA / KWS Screw Conveyor Engineering Guide · DIN 15262 / ISO 7119",
    campos:[
      {id:"Qm",label:"Vazão de projeto",unidade:"t/h",tipo:"number",valor:30},
      {id:"rho",label:"Densidade aparente",unidade:"t/m³",tipo:"number",valor:1.3,step:"0.01"},
      {id:"L",label:"Comprimento",unidade:"m",tipo:"number",valor:12},
      {id:"H",label:"Elevação (0 = horizontal)",unidade:"m",tipo:"number",valor:0},
      {id:"carga",label:"Grau de enchimento da calha",tipo:"select",valor:"0.30",opcoes:[
        {v:"0.45",t:"Leve / fluido (45%)"},{v:"0.30",t:"Médio (30%)"},{v:"0.15",t:"Pesado / abrasivo (15%)"}]},
      {id:"n",label:"Rotação do eixo",unidade:"rpm",tipo:"number",valor:60},
      {id:"lambda",label:"Resistência do material",tipo:"select",valor:"2.5",opcoes:[
        {v:"1.2",t:"Leve, fluido (λ ≈ 1,2)"},{v:"2.5",t:"Médio (λ ≈ 2,5)"},{v:"4.0",t:"Pesado / abrasivo (λ ≈ 4,0)"}]}
    ],
    calcular:function(){
      const Qm=num("Qm"),rho=num("rho"),L=num("L"),H=num("H"),carga=num("carga"),n=num("n"),lam=num("lambda");
      if([Qm,rho,L,H,carga,n,lam].some(x=>isNaN(x))||rho<=0||n<=0) return null;
      const Cv=Qm/rho;                                  // m³/h volumétrico requerido
      const Dcalc=Math.cbrt(Cv/(47.12*carga*n));        // m (passo = D)
      const Dstd=nextStd(Dcalc*1000);                   // mm padrão
      const Qrv=47.12*Math.pow(Dstd/1000,3)*carga*n;    // capacidade real m³/h
      const Qrm=Qrv*rho;                                // capacidade real t/h
      const Ph=Qm*L*lam/367;                            // potência no material
      const Pst=Qm*H/367;                               // potência de elevação
      const Pn=(Dstd/1000)*L/20;                        // potência em vazio
      const Ptot=Ph+Pst+Pn;
      const Pdrive=Ptot*1.2/0.9;                        // fator de serviço 1,2 / rend. 0,9
      const Pmaj=Pdrive*1.20;                           // majoração de 20% (margem de projeto)
      const sew=selSEW(Pmaj,n);
      return [
        {k:"Vazão volumétrica requerida",v:Cv.toFixed(1)+" m³/h"},
        {k:"Diâmetro calculado da rosca",v:(Dcalc*1000).toFixed(0)+" mm"},
        {k:"Diâmetro padrão recomendado",v:Dstd+" mm",hi:true},
        {k:"Capacidade real (Ø padrão)",v:Qrv.toFixed(1)+" m³/h  ·  "+Qrm.toFixed(1)+" t/h"},
        {k:"Potência no material (P_H)",v:Ph.toFixed(2)+" kW"},
        {k:"Potência de elevação (P_st)",v:Pst.toFixed(2)+" kW"},
        {k:"Potência em vazio (P_N)",v:Pn.toFixed(2)+" kW"},

    calcular:function(){

      var H=Li*Math.sin(theta*Math.PI/180);
      var Lh=Lh1+Lh2+Li*Math.cos(theta*Math.PI/180);
      var Ltot=Lh1+Li+Lh2, ang=theta;
      var Qv=Q/rho;
      var SW=[{tp:"L",h:40,bw:30,dv:35},{tp:"N",h:60,bw:50,dv:42},{tp:"N",h:80,bw:50,dv:42},{tp:"N",h:100,bw:50,dv:42},{tp:"N",h:120,bw:50,dv:42},{tp:"S",h:120,bw:78,dv:63},{tp:"S",h:160,bw:78,dv:63},{tp:"S",h:200,bw:78,dv:63},{tp:"S",h:240,bw:78,dv:63},{tp:"S",h:280,bw:78,dv:63},{tp:"S",h:320,bw:78,dv:63},{tp:"ES",h:300,bw:100,dv:84},{tp:"ES",h:400,bw:100,dv:84},{tp:"ES",h:500,bw:100,dv:84},{tp:"ES",h:630,bw:100,dv:84}];

        for(var i=0;i<SW.length;i++){ if(SW[i].tp===stp&&SW[i].h===sh){ sw=SW[i]; break; } }
        if(sw){ bu=B-2*sw.bw; selCap=(bu>0)?3.6*bu*sw.h/1000*v*phi:0; insuf=(selCap<Qv); }
      }
      if(!sw){
        for(var i=0;i<SW.length;i++){ var b=B-2*SW[i].bw; if(b<=0)continue; var cap=3.6*b*SW[i].h/1000*v*phi; if(cap>=Qv){ sw=SW[i]; selCap=cap; bu=b; break; } }
        if(!sw){ sw=SW[SW.length-1]; bu=B-2*sw.bw; selCap=3.6*bu*sw.h/1000*v*phi; insuf=true; }
      }
      var CL=[20,35,40,55,60,75,90,100,110,120,140,160,180,200,220,240,280,300,400,500,600];
      var cleat=CL[CL.length-1]; for(var c=0;c<CL.length;c++){ if(CL[c]>=sw.h){ cleat=CL[c]; break; } }
      var lumpOK=(lump<=400)&&(lump<=bu*0.9)&&(lump<=sw.h);
      var f=0.5, qB=30, qG=Q/(3.6*v), qRol=Math.round(0.018*B);
      var Fp=f*Ltot*9.81*(qB+qRol+qG), Fst=qG*9.81*H, Fsec=0.15*Fp, Fu=Fp+Fsec+Fst;
      var Peff=Fu*v/0.85/1000, Pmaj=Peff*1.20;
      var Te=Peff*1000/v, T1=Te*(1+K), trN=T1/B, carcReq=trN*FS, carcass;
      if(carcReq<=1000){ var EP=[200,250,315,400,500,630,800,1000]; var e=EP.find(function(x){return x>=carcReq;})||1000; carcass="Têxtil EP "+e+" N/mm (tipo ES)"; }
      else{ var ST=[1000,1250,1600,2000,2500,3150,4000,5000,6300,8600]; var s=ST.find(function(x){return x>=carcReq;})||8600; carcass="Cabo de aço ST "+s+" N/mm"; }
      var npul=v*60000/(Math.PI*Dt), sew=selSEW(Pmaj,npul);
      return [

        {k:"Capacidade da configuração",v:fmt(Math.round(selCap))+" m³/h · "+fmt(Math.round(selCap*rho))+" t/h"+(insuf?"  ⚠ aumentar largura/velocidade":"")},
        {sec:"Seleção FLEXOWELL® (catálogo ContiTech)"},

        {sec:"Potência — ISO 5048 / DIN 22101"},

    }

  silo_circular:{
    titulo:"Silo Circular — pré-dimensionamento",
    referencia:"Avaliação de fluxo conforme teoria de A. W. Jenike (Flow Function, fluxo de massa/funil, descarga anti-arco); ações e pressões conforme EN 1991-4 (Eurocode 1, Parte 4) e ABNT NBR 11700; verificação estrutural conforme ABNT NBR 8800. Materiais pré-selecionados usam valores típicos de literatura (densidade ~1,4–2,7 t/m³, atrito interno ~30–70°, atrito de parede ~20–35°) — confirmar em ensaio Jenike Shear. Roteiro completo (Etapas 1-14): dados, capacidade, Flow Function, regime de fluxo e descarga, geometria (corpo + moega cônica), raio hidráulico, pressões de Janssen, fatores de descarga (EN 1991-4), distribuição de pressões, chapas, anéis de reforço, montantes verticais, moega (tração meridional), descarga excêntrica e fadiga/dinâmica (impacto, frequência natural e ressonância) — conforme Jenike, EN 1991-4 e ABNT NBR 8800.",

      {id:"siCi",label:"Fator de impacto  Ci",unidade:"-",tipo:"number",valor:2,step:"0.1"}

    calcular:function(){
      var g=9.81;
      var Q=num("siQ"),t=num("siT"),eta=num("siEta");
      var rho=num("siRho"),phi=num("siPhi"),delta=num("siDelta"),c=num("siCoes"),d50=num("siD50");
      var scMed=num("siSc"),s1=num("siS1"),D=num("siD");
      if([Q,t,eta,rho,phi,delta,c,d50,s1,D].some(function(x){return isNaN(x);})) return null;
      if(Q<=0||t<=0||eta<=0||eta>1||rho<=0||phi<=0||phi>=90||delta<=0||delta>=90||s1<=0||D<=0) return null;
      // Etapa 2 — capacidade
      var massa=Q*t;
      var V=massa/(rho*eta);
      var gamma=rho*g; // kN/m³
      // Flow Function
      var pr=phi*Math.PI/180;
      var scEst=2*c*Math.cos(pr)/(1-Math.sin(pr));
      if(!isFinite(scEst)||scEst<0) scEst=0;
      var sc=(scMed>0)?scMed:scEst;
      var fonteSc=(scMed>0)?"ensaio Jenike (informado)":"estimado: σc = 2c·cosφi/(1−senφi)";
      var ffc=(sc>0.001)?s1/sc:999;
      var classe = ffc<1?"Não flui (endurecido)":ffc<2?"Muito coesivo":ffc<4?"Coesivo":ffc<10?"Fácil escoamento":"Livre escoamento (free-flowing)";
      var ffcTxt=(ffc>=100)?"> 100":ffc.toFixed(1).replace(".",",");
      // Etapa 4/5 — regime de fluxo e descarga (moega cônica)
      var thetaV=50-delta; if(thetaV<5)thetaV=5; if(thetaV>45)thetaV=45; // meia-abertura da vertical p/ fluxo de massa
      var thetaDes=thetaV-3; if(thetaDes<3)thetaDes=3; // margem de segurança
      var alfa=90-thetaDes; // ângulo da moega com a horizontal
      var Hf=2.0+thetaDes/60; // fator de Jenike H(θ) — moega cônica
      var Barco=(sc>0.001)?Hf*sc/gamma:0; // m
      var Bmec=8*d50/1000; // m  (≈ 8·d50 p/ evitar arco mecânico de blocos)
      var Bfloor=0.6; // mínimo prático em silos de minério (600 mm)
      var Brec=Math.max(Barco,Bmec,Bfloor);
      var coeso=(ffc<4);
      // Etapa 3 — geometria (cilindro + moega cônica/tronco de cone)
      var arad=alfa*Math.PI/180;
      var hc=(D-Brec)/2*Math.tan(arad); if(hc<0)hc=0;
      var Vcone=Math.PI/12*hc*(D*D+D*Brec+Brec*Brec);
      var Vcil=V-Vcone, semCorpo=(Vcil<=0);
      var Hcil=semCorpo?0:Vcil/(Math.PI*D*D/4);
      var Htot=Hcil+hc;
      var esbeltez=Htot/D;
      // Etapas 5-6 — raio hidráulico e pressões de Janssen (enchimento)
      var Rh=D/4;
      var Kj=1.1*(1-Math.sin(pr));
      var mu=Math.tan(delta*Math.PI/180);
      var z=Hcil; // altura de enchimento no corpo (transição na base do cilindro)
      var pvAsym=gamma*Rh/(mu*Kj);
      var pv=pvAsym*(1-Math.exp(-mu*Kj*z/Rh));
      var ph=Kj*pv, pw=mu*ph;
      // Etapa 7 — fatores de descarga EN 1991-4 (parede vertical, Classe 2)
      var Ch=1.15, Cw=1.10;
      var phD=Ch*ph, pwD=Cw*pw;
      // Etapa 8 — distribuição de pressões (perfil de Janssen no enchimento)
      function jph(zz){return Kj*pvAsym*(1-Math.exp(-mu*Kj*zz/Rh));}
      var phMid=jph(z/2);
      // Etapa 9 — dimensionamento das chapas (tensão circunferencial de membrana)
      var Rc=D/2;
      var ntheta=phD*Rc;            // kN/m = N/mm  (esforço de membrana com pressão de descarga)
      var fy=parseFloat($("#siFy").value); if(isNaN(fy))fy=345;
      var abr=num("siAbr"); if(isNaN(abr))abr=0;
      var sadm=0.90*fy;             // MPa = N/mm²  (NBR 8800, escoamento, φ=0,90)
      var tcalc=ntheta/sadm;        // mm
      var tmin=6.0;                 // mm — mínimo prático em silos de minério
      var treq=Math.max(tcalc+abr,tmin);
      var COM=[6.3,8.0,9.5,12.5,16.0,19.0,22.4,25.0,31.5];
      var tcom=COM[COM.length-1]; for(var ti=0;ti<COM.length;ti++){ if(COM[ti]>=treq){ tcom=COM[ti]; break; } }
      var govMin=(tcalc+abr<tmin);
      // Etapa 10 — anéis de reforço (estabilidade do casco sob pressão externa, modo de anel n=2)
      var qext=num("siQext"); if(isNaN(qext)||qext<0)qext=0;
      var Ls=num("siLs"); if(isNaN(Ls)||Ls<=0)Ls=3;
      var Eaco=200e6;                       // kPa (200 GPa)
      var Ireq=qext*Math.pow(Rc,3)*Ls/(3*Eaco); // m⁴
      var Ireq_cm4=Ireq*1e8;                // cm⁴
      var nAneis=Math.max(1,Math.ceil(Hcil/Ls)-1);
      // Etapa 11 — montantes verticais (colunas de apoio)
      var Ncol=parseFloat($("#siNcol").value); if(isNaN(Ncol)||Ncol<1)Ncol=4;
      var Hleg=num("siHleg"); if(isNaN(Hleg)||Hleg<=0)Hleg=6;
      var fself=num("siSelf"); if(isNaN(fself)||fself<1)fself=1.15;
      var Wmat=massa*g;                      // kN (massa em t × g)
      var Wtot=Wmat*fself;                   // kN (material + peso próprio/sobrecargas)
      var Pcol=Wtot/Ncol;                    // kN por montante
      var chi=0.6;                           // redução de flambagem assumida (pré-dim)
      var fy_kNcm2=fy/10;                    // MPa → kN/cm²
      var Areq=Pcol/(chi*0.90*fy_kNcm2);     // cm²
      var lamMax=120, Kbuc=2.0;              // engastado-livre (montante em balanço)
      var imin=Kbuc*(Hleg*100)/lamMax;       // cm
      // Etapa 12 — dimensionamento da moega (tremonha cônica, membrana meridional)
      var Atrans=Math.PI*D*D/4;              // m²
      var Fv=pv*Atrans + Vcone*gamma;        // kN (carga vertical na transição: coluna + peso do cone)
      var senA=Math.sin(arad);
      var Tm=(senA>0)?Fv/(Math.PI*D*senA):0; // kN/m (tração meridional na transição)
      var thop=Tm/sadm;                      // mm (Tm[kN/m]=N/mm; sadm[MPa]=N/mm²)
      var thop_req=Math.max(thop+abr,tmin);
      var thopcom=COM[COM.length-1]; for(var th=0;th<COM.length;th++){ if(COM[th]>=thop_req){ thopcom=COM[th]; break; } }
      var pnHop=pv;                          // estimativa da pressão normal na parede (confirmar pico de switch — EN 1991-4)
      var thopMin=(thop+abr<tmin);
      // Etapa 13 — descarga excêntrica (EN 1991-4)
      var e0=num("siEcc"); if(isNaN(e0)||e0<0)e0=0;
      var ecc=e0/D;
      var eccClass=(e0<=0)?"Central (sem excentricidade)":(ecc<0.10)?"Pequena excentricidade":(ecc<0.25)?"Excentricidade moderada":"Excentricidade significativa";
      var eccCrit=(ecc>=0.25);
      // Etapa 14 — fadiga e dinâmica
      var vimp=num("siVimp"); if(isNaN(vimp)||vimp<0)vimp=0;
      var Ci=num("siCi"); if(isNaN(Ci)||Ci<1)Ci=1;
      var mdot=Q*1000/3600;                  // kg/s (vazão mássica)
      var Fimp=Ci*mdot*vimp/1000;            // kN (força de impacto da alimentação)
      var Icol_cm4=Areq*imin*imin;           // cm⁴ (I ≈ A·i²)
      var Icol=Icol_cm4*1e-8;                // m⁴
      var Edin=200e9;                        // Pa
      var klat=Ncol*3*Edin*Icol/Math.pow(Hleg,3); // N/m (apoio em colunas, modelo cantilever)
      var mvib=Wtot*1000/g;                  // kg (massa total vibrante)
      var fn=(klat>0&&mvib>0)?(1/(2*Math.PI))*Math.sqrt(klat/mvib):0; // Hz
      var OUT=[
        {sec:"Etapa 2 — Capacidade do silo"},
        {k:"Massa requerida  m = Q · t",v:fmt(Math.round(massa))+" t"},
        {k:"Volume útil  V = m / (ρ · η)",v:V.toFixed(1).replace(".",",")+" m³",hi:true},
        {k:"Peso específico  γ = ρ · g",v:gamma.toFixed(1).replace(".",",")+" kN/m³"},
        {sec:"Etapas 1 e 4 — Avaliação do material (Flow Function)"},
        {k:"Atrito interno φi · atrito de parede δ",v:phi.toFixed(0)+"° · "+delta.toFixed(0)+"°"},
        {k:"Resistência não confinada  σc",v:sc.toFixed(2).replace(".",",")+" kPa  ("+fonteSc+")"},
        {k:"Tensão de consolidação  σ1",v:s1.toFixed(1).replace(".",",")+" kPa"+(scMed>0?"":"  (referência — refinada pela Etapa 6/Janssen)")},
        {k:"Flow Function  ffc = σ1 / σc",v:ffcTxt},
        {k:"Classificação de fluidez",v:classe,hi:true},
        {sec:"Etapas 4 e 5 — Regime de fluxo e descarga"},
        {k:"Regime de fluxo recomendado",v:"Fluxo de massa (mass flow)",hi:true},
        {k:"Ângulo da moega recomendado (com horizontal)",v:alfa.toFixed(0)+"°  (moega cônica)",hi:true},
        {k:"Meia-abertura da vertical  θ · fator H(θ)",v:thetaDes.toFixed(0)+"° · "+Hf.toFixed(2).replace(".",",")},
        {k:"Descarga mín. anti-arco (Jenike) B = H·σc/γ",v:(Barco>0?(Math.round(Barco*1000)+" mm"):"≈ 0 (sem coesão relevante)")},
        {k:"Descarga mín. por granulometria  ≈ 8·d50",v:Math.round(Bmec*1000)+" mm"},

        {sec:"Etapa 3 — Geometria preliminar (cilindro + moega cônica)"},
        {k:"Diâmetro interno  D",v:D.toFixed(2).replace(".",",")+" m"},

        {sec:"Etapas 5 e 6 — Pressões de Janssen (enchimento)"},
        {k:"Raio hidráulico  R_h = D/4",v:Rh.toFixed(2).replace(".",",")+" m"},
        {k:"Razão de pressões  K = 1,1·(1−senφi)",v:Kj.toFixed(3).replace(".",",")},
        {k:"Coef. de atrito de parede  μ = tg δ",v:mu.toFixed(3).replace(".",",")},
        {k:"Pressão vertical na transição  pv",v:pv.toFixed(1).replace(".",",")+" kPa"},

        {sec:"Etapa 7 — Pressões de descarga (EN 1991-4)"},

        {sec:"Etapa 8 — Distribuição de pressões na parede (perfil de Janssen)"},
        {k:"Pressão horizontal a meia altura  (z = H/2)",v:phMid.toFixed(1).replace(".",",")+" kPa"},
        {k:"Pressão horizontal na transição  (z = H, máx.)",v:ph.toFixed(1).replace(".",",")+" kPa"},
        {k:"Pressão de projeto na parede (descarga, transição)",v:phD.toFixed(1).replace(".",",")+" kPa",hi:true},
        {sec:"Etapa 9 — Dimensionamento das chapas (tensão circunferencial)"},
        {k:"Raio  R = D/2",v:Rc.toFixed(2).replace(".",",")+" m"},
        {k:"Esforço de membrana circunferencial  nθ = ph,d·R",v:ntheta.toFixed(1).replace(".",",")+" kN/m"},
        {k:"Tensão admissível  σadm = 0,90·fy  (NBR 8800)",v:fy+" MPa → "+sadm.toFixed(0)+" MPa"},
        {k:"Espessura por tração  t = nθ/σadm",v:tcalc.toFixed(2).replace(".",",")+" mm  (+ "+abr.toFixed(1).replace(".",",")+" mm abrasão/corrosão)"},
        {k:"Espessura recomendada (chapa comercial)",v:tcom.toFixed(1).replace(".",",")+" mm"+(govMin?"  (governada pelo mínimo prático 6 mm)":""),hi:true},
        {sec:"Etapa 10 — Anéis de reforço (estabilidade sob pressão externa)"},
        {k:"Pressão externa de projeto (vento/vácuo)",v:qext.toFixed(1).replace(".",",")+" kPa"},
        {k:"Espaçamento entre anéis  L_s",v:Ls.toFixed(1).replace(".",",")+" m"},
        {k:"Momento de inércia requerido  I = q·R³·L_s/(3E)",v:Ireq_cm4.toFixed(1).replace(".",",")+" cm⁴  (E = 200 GPa)",hi:true},
        {k:"Número estimado de anéis no corpo",v:nAneis.toFixed(0)},

        {k:"Recomendação do montante",v:"Perfil tubular ou I com A ≥ "+Areq.toFixed(0)+" cm² e i ≥ "+imin.toFixed(1).replace(".",",")+" cm; verificar flambagem, excentricidade, vento e sismo (NBR 8800)."},
        {sec:"Etapa 12 — Dimensionamento da moega (tremonha cônica)"},
        {k:"Carga vertical na transição  Fv = pv·A + W_cone",v:fmt(Math.round(Fv))+" kN"},
        {k:"Tração meridional  Tm = Fv/(π·D·sen α)",v:Tm.toFixed(1).replace(".",",")+" kN/m",hi:true},
        {k:"Pressão normal na parede (estim.)  pn ≈ pv",v:pnHop.toFixed(1).replace(".",",")+" kPa"},
        {k:"Espessura por tração  t = Tm/σadm  (+ "+abr.toFixed(1).replace(".",",")+" mm abrasão)",v:thop.toFixed(2).replace(".",",")+" mm"},
        {k:"Espessura recomendada da moega (chapa comercial)",v:thopcom.toFixed(1).replace(".",",")+" mm"+(thopMin?"  (mínimo prático)":""),hi:true},
        {k:"Observação da moega",v:"⚠ Verificar o pico de pressão na transição (switch, EN 1991-4) e a abrasão — moegas de minério costumam usar chapa/revestimento mais espessos."},
        {sec:"Etapa 13 — Descarga excêntrica (EN 1991-4)"},
        {k:"Excentricidade da boca  e0",v:e0.toFixed(2).replace(".",",")+" m"},
        {k:"Razão de excentricidade  e0/D",v:ecc.toFixed(3).replace(".",",")},
        {k:"Classificação",v:eccClass,hi:true},
        {k:"Recomendação",v:eccCrit?"⚠ e0/D ≥ 0,25: a EN 1991-4 exige análise do canal de fluxo excêntrico — pressões assimétricas, flexão/ovalização do casco e reforços verticais.":(e0>0?"Efeitos de excentricidade reduzidos; manter a boca o mais centrada possível e verificar a assimetria conforme EN 1991-4.":"Descarga central — sem efeitos de excentricidade. Manter a boca centrada favorece o fluxo de massa.")},
        {sec:"Etapa 14 — Fadiga e dinâmica"},
        {k:"Vazão mássica  ṁ = Q/3,6",v:mdot.toFixed(0)+" kg/s"},
        {k:"Força de impacto da alimentação  F = Ci·ṁ·v",v:Fimp.toFixed(1).replace(".",",")+" kN  (Ci="+Ci.toFixed(1).replace(".",",")+", v="+vimp.toFixed(1).replace(".",",")+" m/s)",hi:true},
        {k:"Massa total vibrante  m = Wtot/g",v:fmt(Math.round(mvib))+" kg"},
        {k:"Rigidez lateral estimada do apoio  k = N·3EI/L³",v:(klat/1e6).toFixed(2).replace(".",",")+" MN/m  (I ≈ A·i²)"},
        {k:"Frequência natural estimada  f = (1/2π)·√(k/m)",v:fn.toFixed(2).replace(".",",")+" Hz",hi:true},
        {k:"Verificação de ressonância",v:"Manter f afastada das frequências de excitação (alimentadores vibratórios ~10-25 Hz; folga ≥ ±20%); verificar fadiga das soldas sob carga cíclica e impacto."},
        {k:"Observação estrutural",v:"⚠ Pré-dimensionamento — não substitui o projeto estrutural detalhado nem a folha de dados; confirmar todas as etapas conforme NBR 8800 / EN 1991-4."},
        {k:"Observação de fluxo",v:coeso?"⚠ Material coesivo (ffc < 4): confirmar σc e σ1 em ensaio Jenike Shear e priorizar fluxo de massa.":"Material de bom escoamento — fluxo de massa com a moega indicada tende a ser suficiente."}
      ];
      OUT.geo={tipo:"circ",D:D,Hcil:Hcil,hc:hc,Htot:Htot,Brec:Brec,alfa:alfa,tcom:tcom,thopcom:thopcom,fy:fy,Vutil:V};
      return OUT;
    }
  },
  silo_retangular:{
    titulo:"Silo Retangular — pré-dimensionamento",
    referencia:"Avaliação de fluxo conforme teoria de A. W. Jenike (Flow Function, fluxo de massa, descarga anti-arco); ações e pressões conforme EN 1991-4 (Eurocode 1, Parte 4) e ABNT NBR 11700; paredes planas a flexão (chapa + enrijecedores) e verificação estrutural conforme ABNT NBR 8800. Roteiro 1-14 — silo prismático com tremonha piramidal.",
    campos:[
      {tipo:"head",label:"Etapa 1 — Dados operacionais"},
      {id:"siQ",label:"Produção da planta  Q",unidade:"t/h",tipo:"number",valor:450},

        {v:"345",t:"ASTM A572 Gr.50 (fy 345 MPa)"},
        {v:"415",t:"ASTM A572 Gr.60 (fy 415 MPa)"}]},

      {id:"rS",label:"Espaçamento dos enrijecedores  s",unidade:"m",tipo:"number",valor:1.5,step:"0.1"},
      {tipo:"head",label:"Etapas 10-11 — Reforços e montantes"},

      {id:"siLs",label:"Espaçamento entre cintas  L_s",unidade:"m",tipo:"number",valor:3,step:"0.5"},

        {v:"4",t:"4 montantes"},{v:"6",t:"6 montantes"},{v:"8",t:"8 montantes"}]},
      {id:"siHleg",label:"Altura livre dos montantes  L",unidade:"m",tipo:"number",valor:6,step:"0.5"},
      {id:"siSelf",label:"Fator de peso próprio + sobrecargas",unidade:"-",tipo:"number",valor:1.15,step:"0.05"},
      {tipo:"head",label:"Etapa 13 — Descarga excêntrica"},
      {id:"siEcc",label:"Excentricidade da boca de descarga  e0",unidade:"m",tipo:"number",valor:0,step:"0.1"},
      {tipo:"head",label:"Etapa 14 — Fadiga e dinâmica"},

      {id:"siCi",label:"Fator de impacto  Ci",unidade:"-",tipo:"number",valor:2,step:"0.1"}
    ],
    calcular:function(){
      var g=9.81;
      var Q=num("siQ"),t=num("siT"),eta=num("siEta");
      var rho=num("siRho"),phi=num("siPhi"),delta=num("siDelta"),c=num("siCoes"),d50=num("siD50");
      var scMed=num("siSc"),s1=num("siS1"),a=num("rA"),b=num("rB");
      if([Q,t,eta,rho,phi,delta,c,d50,s1,a,b].some(function(x){return isNaN(x);})) return null;
      if(Q<=0||t<=0||eta<=0||eta>1||rho<=0||phi<=0||phi>=90||delta<=0||delta>=90||s1<=0||a<=0||b<=0) return null;
      var sst=num("rS"); if(isNaN(sst)||sst<=0)sst=1.5;
      var massa=Q*t, V=massa/(rho*eta), gamma=rho*g;
      var pr=phi*Math.PI/180;
      var scEst=2*c*Math.cos(pr)/(1-Math.sin(pr)); if(!isFinite(scEst)||scEst<0)scEst=0;
      var sc=(scMed>0)?scMed:scEst;
      var fonteSc=(scMed>0)?"ensaio Jenike (informado)":"estimado: σc = 2c·cosφi/(1−senφi)";
      var ffc=(sc>0.001)?s1/sc:999;
      var classe=ffc<1?"Não flui (endurecido)":ffc<2?"Muito coesivo":ffc<4?"Coesivo":ffc<10?"Fácil escoamento":"Livre escoamento (free-flowing)";
      var ffcTxt=(ffc>=100)?"> 100":ffc.toFixed(1).replace(".",",");
      // regime/descarga — tremonha piramidal exige ângulo mais íngreme (efeito de vale)
      var thetaV=50-delta; if(thetaV<5)thetaV=5; if(thetaV>45)thetaV=45;
      var thetaDes=thetaV-8; if(thetaDes<3)thetaDes=3;
      var alfa=90-thetaDes;
      var arad=alfa*Math.PI/180;
      var Hf=2.0+thetaDes/60;
      var Barco=(sc>0.001)?Hf*sc/gamma:0, Bmec=8*d50/1000, Bfloor=0.6;
      var Brec=Math.max(Barco,Bmec,Bfloor);
      var coeso=(ffc<4);
      // Etapa 3 — geometria (prisma + tremonha piramidal, boca quadrada lado Brec)
      var Lmax=Math.max(a,b), Lmin=Math.min(a,b);
      var hc=(Lmax/2-Brec/2)*Math.tan(arad); if(hc<0)hc=0;
      var A1=a*b, A2=Brec*Brec;
      var Vpir=(hc/3)*(A1+A2+Math.sqrt(A1*A2));
      var Vcil=V-Vpir, semCorpo=(Vcil<=0);
      var Hcil=semCorpo?0:Vcil/(a*b);
      var Htot=Hcil+hc, esbeltez=Htot/Lmin;
      // Etapas 5-6 — raio hidráulico retangular e Janssen
      var Rh=(a*b)/(2*(a+b));
      var Kj=1.1*(1-Math.sin(pr)), mu=Math.tan(delta*Math.PI/180);
      var z=Hcil, pvAsym=gamma*Rh/(mu*Kj);
      var pv=pvAsym*(1-Math.exp(-mu*Kj*z/Rh)), ph=Kj*pv, pw=mu*ph;
      var Ch=1.15, Cw=1.10, phD=Ch*ph, pwD=Cw*pw;
      function jph(zz){return Kj*pvAsym*(1-Math.exp(-mu*Kj*zz/Rh));}
      var phMid=jph(z/2);
      // Etapa 9 — chapa plana a flexão (painel entre enrijecedores)
      var fy=parseFloat($("#siFy").value); if(isNaN(fy))fy=345;
      var abr=num("siAbr"); if(isNaN(abr))abr=0;
      var sadm=0.90*fy;
      var Mpl=(phD*1000)*sst*sst/10;                 // N·m/m (painel contínuo)
      var tflex=Math.sqrt(6*Mpl/(sadm*1e6))*1000;    // mm
      var tmin=6.0, treq=Math.max(tflex+abr,tmin);
      var COM=[6.3,8.0,9.5,12.5,16.0,19.0,22.4,25.0,31.5];
      var tcom=COM[COM.length-1]; for(var ti=0;ti<COM.length;ti++){ if(COM[ti]>=treq){ tcom=COM[ti]; break; } }
      var govMin=(tflex+abr<tmin);
      // Etapa 10 — enrijecedores horizontais (cinta): módulo de resistência
      var Lwall=Lmax, wbelt=phD*sst, Mbelt=wbelt*Lwall*Lwall/10;
      var Wreq=Mbelt/(sadm*1000)*1e6;                // cm³
      // Etapa 11 — montantes
      var Ncol=parseFloat($("#siNcol").value); if(isNaN(Ncol)||Ncol<1)Ncol=4;
      var Hleg=num("siHleg"); if(isNaN(Hleg)||Hleg<=0)Hleg=6;
      var fself=num("siSelf"); if(isNaN(fself)||fself<1)fself=1.15;
      var Wmat=massa*g, Wtot=Wmat*fself, Pcol=Wtot/Ncol;
      var chi=0.6, fy_kNcm2=fy/10, Areq=Pcol/(chi*0.90*fy_kNcm2);
      var lamMax=120, Kbuc=2.0, imin=Kbuc*(Hleg*100)/lamMax;
      // Etapa 12 — moega piramidal (tração meridional)
      var Atrans=a*b, Utrans=2*(a+b), Fv=pv*Atrans+Vpir*gamma;
      var senA=Math.sin(arad), Tm=(senA>0)?Fv/(Utrans*senA):0;
      var thop=Tm/sadm, thop_req=Math.max(thop+abr,tmin);
      var thopcom=COM[COM.length-1]; for(var th=0;th<COM.length;th++){ if(COM[th]>=thop_req){ thopcom=COM[th]; break; } }
      var pnHop=pv, thopMin=(thop+abr<tmin);
      // Etapa 13 — excentricidade
      var e0=num("siEcc"); if(isNaN(e0)||e0<0)e0=0;
      var ecc=e0/Lmin;
      var eccClass=(e0<=0)?"Central (sem excentricidade)":(ecc<0.10)?"Pequena excentricidade":(ecc<0.25)?"Excentricidade moderada":"Excentricidade significativa";
      var eccCrit=(ecc>=0.25);
      // Etapa 14 — fadiga e dinâmica
      var vimp=num("siVimp"); if(isNaN(vimp)||vimp<0)vimp=0;
      var Ci=num("siCi"); if(isNaN(Ci)||Ci<1)Ci=1;
      var mdot=Q*1000/3600, Fimp=Ci*mdot*vimp/1000;
      var Icol=Areq*imin*imin*1e-8, Edin=200e9;
      var klat=Ncol*3*Edin*Icol/Math.pow(Hleg,3), mvib=Wtot*1000/g;
      var fn=(klat>0&&mvib>0)?(1/(2*Math.PI))*Math.sqrt(klat/mvib):0;
      var OUT=[
        {sec:"Etapa 2 — Capacidade do silo"},
        {k:"Massa requerida  m = Q · t",v:fmt(Math.round(massa))+" t"},
        {k:"Volume útil  V = m / (ρ · η)",v:V.toFixed(1).replace(".",",")+" m³",hi:true},
        {k:"Peso específico  γ = ρ · g",v:gamma.toFixed(1).replace(".",",")+" kN/m³"},
        {sec:"Etapas 1 e 4 — Avaliação do material (Flow Function)"},
        {k:"Atrito interno φi · atrito de parede δ",v:phi.toFixed(0)+"° · "+delta.toFixed(0)+"°"},
        {k:"Resistência não confinada  σc",v:sc.toFixed(2).replace(".",",")+" kPa  ("+fonteSc+")"},
        {k:"Tensão de consolidação  σ1",v:s1.toFixed(1).replace(".",",")+" kPa"+(scMed>0?"":"  (referência — refinada pela Etapa 6/Janssen)")},
        {k:"Flow Function  ffc = σ1 / σc",v:ffcTxt},
        {k:"Classificação de fluidez",v:classe,hi:true},
        {sec:"Etapas 4 e 5 — Regime de fluxo e descarga (tremonha piramidal)"},
        {k:"Regime de fluxo recomendado",v:"Fluxo de massa (mass flow)",hi:true},
        {k:"Ângulo da moega recomendado (com horizontal)",v:alfa.toFixed(0)+"°  (piramidal — mais íngreme que cônica)",hi:true},
        {k:"Meia-abertura da vertical  θ · fator H(θ)",v:thetaDes.toFixed(0)+"° · "+Hf.toFixed(2).replace(".",",")},
        {k:"Descarga mín. anti-arco (Jenike) B = H·σc/γ",v:(Barco>0?(Math.round(Barco*1000)+" mm"):"≈ 0 (sem coesão relevante)")},
        {k:"Descarga mín. por granulometria  ≈ 8·d50",v:Math.round(Bmec*1000)+" mm"},
        {k:"Lado da boca de descarga recomendado",v:fmt(Math.round(Brec*1000))+" mm  (mín. prático 600–1200 mm)",hi:true},
        {sec:"Etapa 3 — Geometria preliminar (prisma + tremonha piramidal)"},
        {k:"Seção do corpo  a × b",v:a.toFixed(2).replace(".",",")+" × "+b.toFixed(2).replace(".",",")+" m"},
        {k:"Altura da tremonha  hc = (Lmáx−B)/2 · tg α",v:hc.toFixed(2).replace(".",",")+" m  (α = "+alfa.toFixed(0)+"°)"},
        {k:"Volume da tremonha (pirâmide truncada)",v:Vpir.toFixed(1).replace(".",",")+" m³"},
        {k:"Altura do corpo  H",v:(semCorpo?"0  ⚠ a tremonha já comporta o volume — aumentar a×b":Hcil.toFixed(2).replace(".",",")+" m"),hi:true},
        {k:"Altura total  Htot = H + hc",v:Htot.toFixed(2).replace(".",",")+" m"},
        {k:"Esbeltez  Htot / Lmín",v:esbeltez.toFixed(2).replace(".",",")+(esbeltez>=2?"  (silo esbelto)":"  (silo baixo/intermediário)")},
        {sec:"Etapas 5 e 6 — Pressões de Janssen (enchimento)"},
        {k:"Raio hidráulico  R_h = a·b / [2(a+b)]",v:Rh.toFixed(2).replace(".",",")+" m"},
        {k:"Razão de pressões  K = 1,1·(1−senφi)",v:Kj.toFixed(3).replace(".",",")},

  arraste_tubular:{
    titulo:"Transportador de Arraste Tubular — pré-dimensionamento",
    referencia:"Catálogo Schrage Rohrkettensystem (linha CLASSIC, tamanhos 115/135/160/200/270) · correntes de elos redondos RUD · método de tração em transportadores contínuos de corrente · acionamento SEW-EURODRIVE",
    campos:[
      {tipo:"head",label:"Processo"},
      {id:"tcQ",label:"Vazão de projeto",unidade:"t/h",tipo:"number",valor:30},
      {id:"tcRho",label:"Densidade aparente",unidade:"t/m³",tipo:"number",valor:0.8,step:"0.05"},
      {id:"tcLh1",label:"Trecho horizontal inferior",unidade:"m",tipo:"number",valor:5},
      {id:"tcLi",label:"Trecho inclinado (comprimento)",unidade:"m",tipo:"number",valor:10},
      {id:"tcTheta",label:"Ângulo de inclinação do trecho",unidade:"°",tipo:"number",valor:30},
      {id:"tcLh2",label:"Trecho horizontal superior",unidade:"m",tipo:"number",valor:5},
      {id:"tcNb",label:"Número de curvas leves (redirecionamentos)",tipo:"number",valor:2},
      {tipo:"head",label:"Tubo e corrente (catálogo Schrage / RUD)"},
      {id:"tcSize",label:"Tamanho do tubo (Schrage CLASSIC)",tipo:"select",valor:"auto",opcoes:[
        {v:"auto",t:"Automático (pela capacidade)"},
        {v:"115",t:"115 · Ø tubo 115 mm"},{v:"135",t:"135 · Ø tubo 135 mm"},{v:"160",t:"160 · Ø tubo 160 mm"},{v:"200",t:"200 · Ø tubo 200 mm"},{v:"270",t:"270 · Ø tubo 270 mm"}]},
      {id:"tcMum",label:"Atrito material-tubo  μm",tipo:"select",valor:"0.5",opcoes:[
        {v:"0.4",t:"0,40 — fino/fluido"},{v:"0.5",t:"0,50 — médio"},{v:"0.6",t:"0,60 — grosseiro/abrasivo"}]},
      {id:"tcMuc",label:"Atrito corrente-tubo  μc",tipo:"select",valor:"0.3",opcoes:[
        {v:"0.25",t:"0,25 — lubrificado"},{v:"0.3",t:"0,30 — normal"},{v:"0.35",t:"0,35 — seco/abrasivo"}]},
      {id:"tcSF",label:"Fator de segurança da corrente",tipo:"select",valor:"6",opcoes:[
        {v:"5",t:"5 (leve)"},{v:"6",t:"6 (normal)"},{v:"8",t:"8 (severo/abrasivo)"}]}
    ],
    calcular:function(){
      var g=9.81, eta=0.85;
      var Q=num("tcQ"),rho=num("tcRho"),Lh1=num("tcLh1"),Li=num("tcLi"),theta=num("tcTheta"),Lh2=num("tcLh2"),Nb=num("tcNb");
      var mum=parseFloat($("#tcMum").value),muc=parseFloat($("#tcMuc").value),SF=parseFloat($("#tcSF").value);
      if([Q,rho,Lh1,Li,theta,Lh2,Nb].some(function(x){return isNaN(x);})||Q<=0||rho<=0||Lh1<0||Li<0||Lh2<0||theta<0||theta>90||Nb<0) return null;
      var TC=[
        {n:"115",A:0.00578,vmax:0.51,d:14,qc:4.31,pcd:0.35},
        {n:"135",A:0.0106,vmax:0.51,d:14,qc:4.31,pcd:0.35},
        {n:"160",A:0.0156,vmax:0.45,d:18,qc:7.13,pcd:0.40},
        {n:"200",A:0.0249,vmax:0.45,d:18,qc:7.13,pcd:0.40},
        {n:"270",A:0.0411,vmax:0.54,d:26,qc:14.87,pcd:0.49}
      ];
      function cap(s){return s.A*s.vmax*3600;}
      var Qv=Q/rho;
      var sel=$("#tcSize").value, S=null, insuf=false;
      if(sel!=="auto"){ for(var i=0;i<TC.length;i++){ if(TC[i].n===sel){ S=TC[i]; break; } } }
      if(!S){ for(var i=0;i<TC.length;i++){ if(cap(TC[i])>=Qv){ S=TC[i]; break; } } if(!S){ S=TC[TC.length-1]; insuf=true; } }
      var V=Qv/(S.A*3600); if(V>S.vmax){ insuf=true; }
      var Vshow=Math.min(V,S.vmax);
      var qm=rho*S.A*1000, qc=S.qc;
      var th=theta*Math.PI/180, H=Li*Math.sin(th), Lcos=Li*Math.cos(th);
      var Lhoriz=Lh1+Lh2+Lcos, Lpath=Lh1+Li+Lh2;
      var Fhor=g*(qc*muc+qm*mum)*(Lh1+Lh2);
      var Finc=g*((qc*muc+qm*mum)*Math.cos(th)+(qc+qm)*Math.sin(th))*Li;
      var Fret=g*qc*muc*Lpath;
      var F0=Fhor+Finc+Fret, F=F0*(1+0.08*Nb);
      var Peff=F*Vshow/eta/1000, Pmaj=Peff*1.20;
      var nspr=Vshow*60/(Math.PI*S.pcd), sew=selSEW(Pmaj,nspr);
      var Rm=800, BLreq=F*SF, dreq=Math.sqrt(BLreq/(2*(Math.PI/4)*Rm));
      var CH=[14,16,18,20,22,26,30,34];
      var dsel=CH[CH.length-1]; for(var ci=0;ci<CH.length;ci++){ if(CH[ci]>=Math.max(dreq,S.d)){ dsel=CH[ci]; break; } }
      var BLsel=2*(Math.PI/4)*dsel*dsel*Rm;
      var OUT=[
        {sec:"Geometria e capacidade"},
        {k:"Ângulo de inclinação",v:theta.toFixed(0)+"°"},
        {k:"Elevação total  H = L_incl·senθ",v:H.toFixed(2).replace(".",",")+" m"},
        {k:"Comprimento horizontal total",v:Lhoriz.toFixed(1).replace(".",",")+" m"},
        {k:"Comprimento total do percurso",v:Lpath.toFixed(1).replace(".",",")+" m"},
        {k:"Vazão volumétrica requerida",v:Qv.toFixed(1).replace(".",",")+" m³/h"},
        {sec:"Tubo e velocidade (catálogo Schrage CLASSIC)"},
        {k:"Tamanho do tubo selecionado",v:"Tipo "+S.n+"  (área útil "+(S.A*1e4).toFixed(0)+" cm²)",hi:true},
        {k:"Velocidade da corrente requerida",v:Vshow.toFixed(2).replace(".",",")+" m/s"+(insuf?"  ⚠ acima da capacidade — usar tamanho maior":"  (máx. "+S.vmax.toFixed(2).replace(".",",")+" m/s)")},
        {k:"Capacidade máx. do tamanho",v:cap(S).toFixed(1).replace(".",",")+" m³/h · "+(cap(S)*rho).toFixed(1).replace(".",",")+" t/h"},
        {k:"Massa por metro: material · corrente",v:qm.toFixed(1).replace(".",",")+" · "+qc.toFixed(1).replace(".",",")+" kg/m"},
        {sec:"Tração na corrente"},
        {k:"Resist. trechos horizontais",v:fmt(Math.round(Fhor))+" N"},
        {k:"Resist. trecho inclinado (atrito + elevação)",v:fmt(Math.round(Finc))+" N"},
        {k:"Resist. ramal de retorno (corrente)",v:fmt(Math.round(Fret))+" N"},
        {k:"Acréscimo por curvas leves ("+Nb.toFixed(0)+" × 8%)",v:"+"+((0.08*Nb)*100).toFixed(0)+"%"},
        {k:"Tração total de trabalho  F",v:fmt(Math.round(F))+" N",hi:true},
        {sec:"Potência e acionamento SEW"},
        {k:"Potência efetiva  P = F·v/η  (η 0,85)",v:Peff.toFixed(2).replace(".",",")+" kW · "+(Peff/0.7457).toFixed(1).replace(".",",")+" HP",hi:true},
        {k:"Potência final majorada (+20%)",v:Pmaj.toFixed(2).replace(".",",")+" kW",hi:true},
        {k:"Rotação da roda dentada (Ø "+(S.pcd*1000).toFixed(0)+" mm)",v:nspr.toFixed(1).replace(".",",")+" rpm"},
        {k:"Momento no eixo do redutor  T = 9550·P/n",v:fmt(Math.round(sew.T))+" N·m"},
        {k:"Torque de seleção (T · fB)",v:fmt(Math.round(sew.Tsel))+" N·m"},
        {k:"Relação de redução  i = n_motor / n_saída",v:"≈ "+sew.i.toFixed(1).replace(".",",")+" : 1"},
        {k:"Motor SEW (4 polos, ~1750 rpm)",v:sew.mot.kw.toString().replace(".",",")+" kW · "+sew.mot.d,hi:true},
        {k:"Motoredutor SEW recomendado",v:sew.red.s+" "+sew.mot.d+((sew.red.t<sew.Tsel||sew.mot.kw<Pmaj)?"  ⚠ acima da série R — usar redutor industrial SEW (M/X)":""),hi:true},
        {sec:"Corrente de elos redondos (tipo RUD)"},
        {k:"Carga de ruptura requerida  F · FS",v:fmt(Math.round(BLreq/1000))+" kN  (FS "+SF.toFixed(0)+")"},
        {k:"Bitola da corrente recomendada",v:"Ø "+dsel+" mm  (elo redondo, aço de corrente ~800 N/mm²)",hi:true},
        {k:"Carga de ruptura da corrente Ø "+dsel,v:fmt(Math.round(BLsel/1000))+" kN  (FS efetivo "+(BLsel/F).toFixed(1).replace(".",",")+")"},
        {k:"Observação",v:"Pré-dimensionamento — confirmar capacidade/potência no configurador Schrage e a corrente no catálogo RUD. Velocidade de corrente baixa (≤ 0,5 m/s) garante transporte suave e baixo desgaste."}
      ];
      OUT.geo={tipo:"arraste",size:S.n,Vsel:Vshow,H:H,Lhoriz:Lhoriz,Lh1:Lh1,Li:Li,Lh2:Lh2,theta:theta,Pmaj:Pmaj,chainD:dsel,motorkw:sew.mot.kw,motord:sew.mot.d};
      return OUT;
    }
  },
  elevador_canecas:{
    titulo:"Elevador de Canecas — pré-dimensionamento",
    referencia:"Método CEMA (Bucket Elevators) e velocidades de descarga · canecas tipo 4B/Tapco/Maxi-Lift (volume e espaçamento) · referência de mineração pesada BEUMER (correia) e AUMUND (corrente central forjada BWZ) · acionamento SEW-EURODRIVE",
    campos:[
      {tipo:"head",label:"Processo"},
      {id:"ecQ",label:"Vazão de projeto",unidade:"t/h",tipo:"number",valor:60},
      {id:"ecRho",label:"Densidade aparente",unidade:"t/m³",tipo:"number",valor:1.5,step:"0.05"},
      {id:"ecH",label:"Altura de elevação",unidade:"m",tipo:"number",valor:25},
      {id:"ecFill",label:"Fator de enchimento da caneca",tipo:"select",valor:"0.75",opcoes:[
        {v:"0.6",t:"0,60 — difícil/coesivo"},{v:"0.75",t:"0,75 — médio"},{v:"0.85",t:"0,85 — fino/fluido"}]},

        {v:"centrifuga",t:"Centrífuga (alta velocidade — grãos/granel médio)"},{v:"continua",t:"Contínua (baixa velocidade — grosso/abrasivo/quente)"}]},
      {id:"ecBucket",label:"Caneca (catálogo)",tipo:"select",valor:"auto",opcoes:[
        {v:"auto",t:"Automático (pela capacidade)"},
        {v:"C2",t:"C2 · 2 L"},{v:"C5",t:"C5 · 5 L"},{v:"C10",t:"C10 · 10 L"},{v:"C20",t:"C20 · 20 L"},{v:"C40",t:"C40 · 40 L"},{v:"C80",t:"C80 · 80 L"}]},

      {id:"ecD",label:"Diâmetro do tambor/roda da cabeça",unidade:"m",tipo:"number",valor:0.6,step:"0.05"},
      {id:"ecSF",label:"Fator de segurança (correia/corrente)",tipo:"select",valor:"8",opcoes:[
        {v:"6",t:"6 (corrente leve)"},{v:"8",t:"8 (normal)"},{v:"10",t:"10 (correia/severo)"}]}
    ],
    calcular:function(){
      var g=9.81, eta=0.9;
      var Q=num("ecQ"),rho=num("ecRho"),H=num("ecH"),D=num("ecD");
      var fill=parseFloat($("#ecFill").value),disc=$("#ecDisc").value,trac=$("#ecTrac").value,SF=parseFloat($("#ecSF").value);
      if([Q,rho,H,D].some(function(x){return isNaN(x);})||Q<=0||rho<=0||H<=0||D<=0) return null;
      var BK=[
        {n:"C2",Vb:2.0,hb:0.16,w:0.20},{n:"C5",Vb:5.0,hb:0.20,w:0.30},{n:"C10",Vb:10,hb:0.25,w:0.40},
        {n:"C20",Vb:20,hb:0.32,w:0.50},{n:"C40",Vb:40,hb:0.40,w:0.65},{n:"C80",Vb:80,hb:0.50,w:0.80}
      ];
      var vnat=2.215*Math.sqrt(D), nnat=42.3/Math.sqrt(D);
      var v=(disc==="centrifuga")?Math.min(vnat,1.8):0.9;
      var n=v*60/(Math.PI*D);
      function spac(bk){ return (disc==="centrifuga"?2.4:1.1)*bk.hb; }
      function capBk(bk){ return 3.6*(bk.Vb/spac(bk))*v*rho*fill; }
      var sel=$("#ecBucket").value, BK0=null, insuf=false;
      if(sel!=="auto"){ for(var i=0;i<BK.length;i++){ if(BK[i].n===sel){ BK0=BK[i]; break; } } }
      if(!BK0){ for(var i=0;i<BK.length;i++){ if(capBk(BK[i])>=Q){ BK0=BK[i]; break; } } if(!BK0){ BK0=BK[BK.length-1]; insuf=true; } }
      var a=spac(BK0), capsel=capBk(BK0); if(capsel<Q) insuf=true;
      var qmat=Q/(3.6*v), Nbk=Math.ceil(2*(H+1)/a);
      var fd=(disc==="centrifuga")?1.15:1.10;
      var Plift=Q*H/(367*eta), Peff=Plift*fd, Pmaj=Peff*1.20;
      var sew=selSEW(Pmaj,n);
      var Fwork=Pmaj*1000/v;
      var beltB=0, epClass=0, BLreq=0;
      if(trac==="correia"){
        beltB=Math.ceil((BK0.w*1000+50)/50)*50;
        var EPc=[250,400,500,630,800,1000,1250], req=(Fwork/beltB)*SF;
        epClass=EPc[EPc.length-1]; for(var e=0;e<EPc.length;e++){ if(EPc[e]>=req){ epClass=EPc[e]; break; } }
      } else { BLreq=Fwork*SF; }
      var discOK=(disc==="centrifuga")?(Math.abs(v-vnat)/vnat<0.15):true;
      var OUT=[
        {sec:"Capacidade e caneca"},
        {k:"Vazão de projeto",v:Q.toFixed(0)+" t/h"},
        {k:"Vazão volumétrica  Q/ρ",v:(Q/rho).toFixed(1).replace(".",",")+" m³/h"},
        {k:"Tipo de descarga",v:(disc==="centrifuga"?"Centrífuga (alta velocidade)":"Contínua (baixa velocidade)")},
        {k:"Caneca selecionada",v:"Tipo "+BK0.n+" · "+BK0.Vb.toFixed(1).replace(".",",")+" L · largura "+(BK0.w*1000).toFixed(0)+" mm",hi:true},
        {k:"Espaçamento entre canecas",v:(a*1000).toFixed(0)+" mm"+(insuf?"  ⚠ acima da capacidade — usar caneca/elevador maior":"")},
        {k:"Capacidade da configuração",v:capsel.toFixed(1).replace(".",",")+" t/h · "+(capsel/rho).toFixed(1).replace(".",",")+" m³/h  (enchimento "+(fill*100).toFixed(0)+"%)"},
        {k:"Número aproximado de canecas (2 ramais)",v:Nbk+" un"},
        {sec:"Velocidade e descarga"},

      // Gráfico B — capacidade básica C (m³/h·m²) x abertura (mm)

/* ---------- Menu ---------- */
function buildMenu(){
  const menu=DB.meta.menu||[];
  $("#menu").innerHTML=menu.map(g=>{
    const subs=(g.subgrupos||[]).map(s=>`<button class="navitem" data-grupo="${g.grupo}" data-sub="${s}">${s}</button>`).join("");
    return `<div class="grp open" data-grp="${g.grupo}"><button class="grphead" data-grupo="${g.grupo}"><span>${g.grupo}</span><span class="arrow">›</span></button><div class="subs">${subs}</div></div>`;
  }).join("");
  document.querySelectorAll(".grphead").forEach(b=>b.addEventListener("click",()=>{b.closest(".grp").classList.toggle("open");selectFilter(b.dataset.grupo,"");}));
  document.querySelectorAll(".subs .navitem").forEach(b=>b.addEventListener("click",()=>{selectFilter(b.dataset.grupo,b.dataset.sub);closeDrawer();}));
  $(".navitem.all").addEventListener("click",()=>{selectFilter("","");closeDrawer();});
}
function selectFilter(g,s){
  curGrupo=g;curSub=s;
  document.querySelectorAll(".navitem,.grp").forEach(n=>n.classList.remove("active"));
  if(!g){$(".navitem.all").classList.add("active");}
  else{const grp=document.querySelector(`.grp[data-grp="${CSS.escape(g)}"]`);if(grp)grp.classList.add("active","open");
    if(s){const el=document.querySelector(`.subs .navitem[data-grupo="${CSS.escape(g)}"][data-sub="${CSS.escape(s)}"]`);if(el)el.classList.add("active");}}
  render();
}
function openDrawer(){$("#drawer").classList.add("open");$("#overlay").classList.add("open");}
function closeDrawer(){$("#drawer").classList.remove("open");$("#overlay").classList.remove("open");}

function render(){
  const list=DB.equipamentos.filter(e=>(!curGrupo||e.grupo===curGrupo)&&(!curSub||e.subgrupo===curSub));
  $("#count").textContent=list.length+" equipamento"+(list.length!==1?"s":"");
  $("#title").textContent=curSub||curGrupo||"Dimensionamento de Equipamentos";

function openItem(i){
  const e=DB.equipamentos[i];
  CUR_EQ=e;
  const calc=CALCS[e.calculadora];
  if(!calc){
    $("#sheet").innerHTML=`
      <div class="head"><div class="ic">${icon(e)}</div>
        <div><h2>${e.modelo}</h2><div class="sub">${e.subtipo}</div></div>
        <button class="close" onclick="closeModal()">×</button></div>
      <div class="calcbody"><div class="inputs">
        <div class="placeholder" style="padding:8px 0"><b>Calculadora em desenvolvimento.</b><br>${e.descricao||""}</div>
        <div class="note">Referência prevista: ${e.referencia||"—"}</div>
      </div></div>`;
    $("#modal").classList.add("open");
    return;
  }
  const campos=calc.campos.map(f=>{
    if(f.tipo==="head"){return `<div class="fhead">${f.label}</div>`;}
    if(f.tipo==="select"){
      const ops=f.opcoes.map(o=>`<option value="${o.v}"${o.v===f.valor?" selected":""}>${o.t}</option>`).join("");
      return `<div class="field"><label>${f.label}</label><select id="${f.id}"${f.onchange?` onchange="${f.onchange}"`:""}>${ops}</select></div>`;
    }
    return `<div class="field"><label>${f.label} ${f.unidade?`<span class="u">(${f.unidade})</span>`:""}</label>
      <input id="${f.id}" type="number" value="${f.valor}" step="${f.step||"any"}"/></div>`;
  }).join("");
  $("#sheet").innerHTML=`
    <div class="head"><div class="ic">${icon(e)}</div>
      <div><h2>${e.modelo}</h2><div class="sub">${e.subtipo} · pré-dimensionamento</div></div>
      <button class="close" onclick="closeModal()">×</button></div>
    <div class="calcbody">
      <div class="inputs"><div class="sec-t">Dados de entrada</div>${campos}
        <button class="btn" onclick="runCalc('${e.calculadora}')">Calcular</button>
        <button class="btn btn2" onclick="gerarRelatorio()">Gerar relatório (PDF)</button>
        ${ANIM[e.calculadora]||""}
      </div>
      <div class="results" id="results"><div class="sec-t">Resultados</div>
        <div class="placeholder">Preencha os dados e clique em <b>Calcular</b>.</div>
        <div class="note">Referência: ${calc.referencia}</div></div>
    </div>`;
  $("#modal").classList.add("open");
  runCalc(e.calculadora);
}
function runCalc(id){
  const calc=CALCS[id];const r=calc.calcular();
  const box=$("#results");
  if(!r){box.innerHTML=`<div class="sec-t">Resultados</div><div class="placeholder">Verifique os dados de entrada (valores positivos).</div><div class="note">Referência: ${calc.referencia}</div>`;return;}
  const rows=r.map(x=> x.sec
    ? `<tr><td colspan="2" style="padding:16px 6px 6px;color:var(--teal-d);font-weight:700;font-size:.74rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--teal)">${x.sec}</td></tr>`
    : `<tr class="${x.hi?"highlight":""}"><td class="k">${x.k}</td><td class="v">${x.v}</td></tr>`).join("");
  box.innerHTML=`<div class="sec-t">Resultados</div><table class="res">${rows}</table>
    <div class="note">Estimativa de <b>pré-dimensionamento</b>. A seleção SEW usa torques nominais aproximados de catálogo — confirmar a escolha final no <a href="https://www.sew-eurodrive.com" target="_blank" rel="noopener">configurador oficial SEW</a>.<br><b>Resultado final majorado em 20%</b> (margem de projeto) — a seleção do motor/redutor SEW considera a potência majorada.<br>Referência: ${calc.referencia} · SEW-EURODRIVE (série R / motores DRN).</div>`;
}
function san(s){return String(s==null?"":s).replace(/³/g,"3").replace(/²/g,"2").replace(/⁴/g,"4").replace(/·/g,"-").replace(/≥/g,">=").replace(/≤/g,"<=").replace(/≈/g,"~").replace(/→/g,"->").replace(/⚠/g,"(!)").replace(/×/g,"x").replace(/√/g,"raiz").replace(/[−–—]/g,"-").replace(/φi/g,"fi").replace(/σc/g,"sc").replace(/σ1/g,"s1").replace(/σadm/g,"sadm").replace(/ρ/g,"ro").replace(/φ/g,"phi").replace(/δ/g,"delta").replace(/η/g,"eta").replace(/σ/g,"sigma").replace(/θ/g,"teta").replace(/α/g,"alfa").replace(/λ/g,"lambda").replace(/γ/g,"gama").replace(/β/g,"beta").replace(/π/g,"pi").replace(/τ/g,"tau").replace(/ε/g,"eps").replace(/[μµ]/g,"u").replace(/[ΔΘ]/g,"D").replace(/[Øø]/g,"O").replace(/[^\x00-\xFF]/g,"");}
function inputVal(f){var el=document.getElementById(f.id);if(!el)return "";if(f.tipo==="select")return el.options[el.selectedIndex].text;return el.value+(f.unidade?" "+f.unidade:"");}

      doc.setLineWidth(0.7); doc.line(hx+hw-8,hy+14,rcx+15,rcy-17); doc.line(hx+hw-8,hy+40,rcx+17,rcy-1);
      doc.setDrawColor(217,169,74); doc.setLineWidth(0.8);
      doc.line(rcx,hy-12,rcx,hy-3); doc.line(rcx-2.2,hy-7,rcx,hy-3); doc.line(rcx+2.2,hy-7,rcx,hy-3);
      doc.line(rcx,hy+hh+3,rcx,hy+hh+12); doc.line(rcx-2.2,hy+hh+9,rcx,hy+hh+12); doc.line(rcx+2.2,hy+hh+9,rcx,hy+hh+12);
      doc.setDrawColor(30,155,196); doc.setLineWidth(0.3); doc.setTextColor(30,120,150); doc.setFontSize(8);
      doc.line(rcx-rr,rcy+rr+8,rcx+rr,rcy+rr+8); doc.text("rotor Ø "+G.Drot+" mm",rcx,rcy+rr+12,{align:"center"});
      doc.text("placas de impacto",hx+hw+4,hy+26);
      doc.autoTable({startY:hy+hh+18,theme:"grid",margin:{left:14,right:14},
        head:[["Resultado do pré-dimensionamento","Valor"]],
        body:[
          [san("Modelo (Nordberg Série NP)"),G.model],
          [san("Boca de alimentação"),san(G.fo)+" mm"],
          [san("Maior bloco da alimentação"),san(String(Math.round(G.Fmax)))+" mm"],
          [san("Rotor (Ø × largura)"),G.Drot+" × "+G.Wrot+" mm"],
          [san("Razão de redução  R80"),san(G.R80.toFixed(1))+" : 1"],
          [san("Capacidade (catálogo)"),san(G.cap.toFixed(0))+" t/h"],
          [san("Potência de Bond"),san(G.Pbond.toFixed(1))+" kW"],
          [san("Potência instalada (nom./máx.)"),G.kw+" / "+G.kwmax+" kW"]
        ],
        headStyles:{fillColor:[22,38,60],textColor:255,fontSize:9},bodyStyles:{fontSize:8.5},
        alternateRowStyles:{fillColor:[244,247,250]},
        columnStyles:{0:{cellWidth:120},1:{cellWidth:62,halign:"right",fontStyle:"bold"}}});
      doc.setFontSize(7); doc.setTextColor(110);
      doc.text(san("Croqui esquemático (fora de escala) — rotor de impacto e medidas resultantes do pré-dimensionamento."),14,doc.lastAutoTable.finalY+6);
    } else if(G.tipo==="martelo"){
      doc.setDrawColor(20,40,60); doc.setLineWidth(0.9);
      var hx=42,hy=50,hw=86,hh=96;
      doc.rect(hx,hy,hw,hh,"S");
      var rcx=hx+34,rcy=hy+46,rr=22;
      doc.setLineWidth(1.1); doc.circle(rcx,rcy,rr,"S");
      doc.line(rcx-rr,rcy,rcx+rr,rcy); doc.line(rcx,rcy-rr,rcx,rcy+rr);
      doc.setFillColor(159,177,196); doc.circle(rcx,rcy,3,"FD");
      doc.setDrawColor(20,40,60); doc.setLineWidth(0.8);
      for(var gb=rcx-rr; gb<=rcx+rr+0.1; gb+=6){ doc.line(gb,hy+hh-2,gb,hy+hh+6); }
      doc.setLineWidth(0.7); doc.line(hx+hw-8,hy+12,rcx+15,rcy-16);
      doc.setDrawColor(217,169,74); doc.setLineWidth(0.8);
      doc.line(rcx,hy-12,rcx,hy-3); doc.line(rcx-2.2,hy-7,rcx,hy-3); doc.line(rcx+2.2,hy-7,rcx,hy-3);
      doc.line(rcx,hy+hh+8,rcx,hy+hh+16); doc.line(rcx-2.2,hy+hh+13,rcx,hy+hh+16); doc.line(rcx+2.2,hy+hh+13,rcx,hy+hh+16);
      doc.setDrawColor(30,155,196); doc.setLineWidth(0.3); doc.setTextColor(30,120,150); doc.setFontSize(8);
      doc.line(rcx-rr,rcy+rr+8,rcx+rr,rcy+rr+8); doc.text("rotor Ø "+G.D+" mm",rcx,rcy+rr+12,{align:"center"});
      doc.text("grelha "+san(String(Math.round(G.grelha)))+" mm",rcx+rr+20,hy+hh-2);
      doc.autoTable({startY:hy+hh+20,theme:"grid",margin:{left:14,right:14},
        head:[["Resultado do pré-dimensionamento","Valor"]],
        body:[
          [san("Modelo (classe hammer / EV)"),G.model],
          [san("Rotor (Ø × comprimento)"),G.D+" × "+G.L+" mm"],
          [san("Maior bloco da alimentação"),san(String(Math.round(G.Fmax)))+" mm"],
          [san("Abertura da grelha"),san(String(Math.round(G.grelha)))+" mm"],
          [san("P80 estimado do produto"),san(G.P80.toFixed(0))+" mm"],
          [san("Razão de redução  R80"),san(G.R80.toFixed(1))+" : 1"],
          [san("Capacidade (catálogo)"),san(G.cap.toFixed(0))+" t/h"],
          [san("Potência de Bond"),san(G.Pbond.toFixed(1))+" kW"],
          [san("Potência instalada"),G.kw+" kW"]
        ],
        headStyles:{fillColor:[22,38,60],textColor:255,fontSize:9},bodyStyles:{fontSize:8.5},
        alternateRowStyles:{fillColor:[244,247,250]},
        columnStyles:{0:{cellWidth:120},1:{cellWidth:62,halign:"right",fontStyle:"bold"}}});
      doc.setFontSize(7); doc.setTextColor(110);
      doc.text(san("Croqui esquemático (fora de escala) — rotor de martelos e grelha; medidas resultantes do pré-dimensionamento."),14,doc.lastAutoTable.finalY+6);
    } else if(G.tipo==="peneira"){
      doc.setDrawColor(20,40,60); doc.setLineWidth(0.9);
      var px=40,py=66,pw=120,ph=20;
      // caixa de alimentação
      doc.setFillColor(27,44,62); doc.lines([[20,0],[-6,16],[-8,0]],px-6,py-12,[1,1],"FD",true);
      // deck superior (tela) e caixa
      doc.rect(px,py,pw,ph,"S");
      doc.setDrawColor(90,110,130); doc.setLineWidth(0.4);
      for(var t=px+8;t<px+pw;t+=8){ doc.line(t,py,t,py+5); }
      doc.line(px,py+5,px+pw,py+5);
      // deck inferior
      doc.setDrawColor(20,40,60); doc.setLineWidth(0.6); doc.line(px,py+ph,px+pw,py+ph);
      // molas
      doc.setDrawColor(120); doc.setLineWidth(0.5);
      doc.line(px+4,py+ph,px+4,py+ph+8); doc.line(px+pw-4,py+ph,px+pw-4,py+ph+8);
      // setas de fluxo
      doc.setDrawColor(217,169,74); doc.setLineWidth(0.8);
      doc.line(px+pw+2,py+2,px+pw+12,py+2); doc.line(px+pw+8,py-1,px+pw+12,py+2); doc.line(px+pw+8,py+5,px+pw+12,py+2);
      doc.setTextColor(180,140,60); doc.setFontSize(7.5); doc.text("retido",px+pw+3,py-2);
      doc.setDrawColor(60,150,200); doc.setLineWidth(0.7);
      doc.line(px+40,py+ph+2,px+40,py+ph+10); doc.line(px+38,py+ph+7,px+40,py+ph+10); doc.line(px+42,py+ph+7,px+40,py+ph+10);
      doc.line(px+80,py+ph+2,px+80,py+ph+10); doc.line(px+78,py+ph+7,px+80,py+ph+10); doc.line(px+82,py+ph+7,px+80,py+ph+10);
      doc.setTextColor(40,120,160); doc.text("passante (finos)",px+34,py+ph+15);
      doc.setTextColor(120,140,160); doc.setFontSize(7.5); doc.text("alimentação",px-12,py-14);
      // cotas
      doc.setDrawColor(30,155,196); doc.setLineWidth(0.3); doc.setTextColor(30,120,150); doc.setFontSize(8);
      var dy=py-7; doc.line(px,dy,px+pw,dy); doc.line(px,dy-1.6,px,dy+1.6); doc.line(px+pw,dy-1.6,px+pw,dy+1.6);
      doc.text("comprimento L = "+san(G.L.toFixed(2))+" m",px+pw/2,dy-1.2,{align:"center"});
      doc.autoTable({startY:py+ph+22,theme:"grid",margin:{left:14,right:14},
        head:[["Resultado do pré-dimensionamento","Valor"]],
        body:[
          [san("Modelo (área ativa Metso)"),G.model+" · "+san(G.Amod.toFixed(2))+" m²"],
          [san("Largura × comprimento do deck"),san(G.W.toFixed(2))+" × "+san(G.L.toFixed(2))+" m"],
          [san("Abertura desejada (separação)"),san(String(Math.round(G.ab)))+" mm"],
          [san("Alimentação volumétrica  T"),san(G.T.toFixed(1))+" m³/h"],
          [san("Capacidade básica  C"),san(G.C.toFixed(1))+" m³/h·m²"],
          [san("Fator M (oversize)"),san(G.M.toFixed(2))],
          [san("Fator K (% < ½ abertura)"),san(G.K.toFixed(2))],
          [san("Produto de correção  Qn"),san(G.Qn.toFixed(3))],
          [san("Área necessária  A"),san(G.A.toFixed(2))+" m²"],
          [san("Espessura da camada na descarga  D"),san(G.Dbed.toFixed(0))+" mm"]
        ],
        headStyles:{fillColor:[22,38,60],textColor:255,fontSize:9},bodyStyles:{fontSize:8.5},
        alternateRowStyles:{fillColor:[244,247,250]},
        columnStyles:{0:{cellWidth:120},1:{cellWidth:62,halign:"right",fontStyle:"bold"}}});
      doc.setFontSize(7); doc.setTextColor(110);
      doc.text(san("Croqui esquemático (fora de escala) — peneira horizontal de movimento linear; medidas resultantes do pré-dimensionamento."),14,doc.lastAutoTable.finalY+6);
    } else {
    var cx=80, wH=26, oH=8, topY=50, transY=112, botY=142;
    // preenchimento do material (corpo + moega)
    doc.setFillColor(245,228,190);
    doc.rect(cx-wH,topY,2*wH,transY-topY,"F");
    doc.lines([[2*wH,0],[-(wH-oH),botY-transY],[-2*oH,0],[-(wH-oH),-(botY-transY)]],cx-wH,transY,[1,1],"F",true);
    // contornos do silo
    doc.setDrawColor(20,40,60); doc.setLineWidth(0.7);
    doc.line(cx-wH,topY,cx,topY-11); doc.line(cx,topY-11,cx+wH,topY);
    doc.line(cx-wH,topY,cx-wH,transY); doc.line(cx+wH,topY,cx+wH,transY); doc.line(cx-wH,topY,cx+wH,topY);
    doc.line(cx-wH,transY,cx-oH,botY); doc.line(cx+wH,transY,cx+oH,botY);
    doc.line(cx-wH,transY,cx+wH,transY); doc.line(cx-oH,botY,cx+oH,botY);
    // linhas de cota
    doc.setDrawColor(30,155,196); doc.setLineWidth(0.3); doc.setTextColor(30,120,150); doc.setFontSize(8);
    var dy=topY-7; doc.line(cx-wH,dy,cx+wH,dy); doc.line(cx-wH,dy-1.6,cx-wH,dy+1.6); doc.line(cx+wH,dy-1.6,cx+wH,dy+1.6);
    doc.text((G.tipo==="ret"?"a = ":"D = ")+san(G.D.toFixed(2))+" m",cx,dy-1.2,{align:"center"});
    var rx=cx+wH+9; doc.line(rx,topY,rx,transY); doc.line(rx-1.6,topY,rx+1.6,topY); doc.line(rx-1.6,transY,rx+1.6,transY);
    doc.text("H = "+san(G.Hcil.toFixed(2))+" m",rx+2,(topY+transY)/2+1);
    doc.line(rx,transY,rx,botY); doc.line(rx-1.6,transY,rx+1.6,transY); doc.line(rx-1.6,botY,rx+1.6,botY);
    doc.text("hc = "+san(G.hc.toFixed(2))+" m",rx+2,(transY+botY)/2+1);
    var lx=cx-wH-9; doc.line(lx,topY,lx,botY); doc.line(lx-1.6,topY,lx+1.6,topY); doc.line(lx-1.6,botY,lx+1.6,botY);
    doc.text("Htot = "+san(G.Htot.toFixed(2))+" m",lx-2,(topY+botY)/2+1,{align:"right"});
    var by=botY+7; doc.line(cx-oH,by,cx+oH,by); doc.line(cx-oH,by-1.6,cx-oH,by+1.6); doc.line(cx+oH,by-1.6,cx+oH,by+1.6);
    doc.text("B = "+san(String(Math.round(G.Brec*1000)))+" mm",cx,by+4,{align:"center"});
    doc.text("ang. moega "+san(G.alfa.toFixed(0))+"°",cx+oH+4,botY-3);
    // legenda com as medidas resultantes
    var legBody=[];
    if(G.tipo==="ret"){
      legBody.push([san("Largura interna  a"),san(G.D.toFixed(2))+" m"]);
      legBody.push([san("Profundidade interna  b"),san(G.b.toFixed(2))+" m"]);
      legBody.push([san("Altura do corpo  H"),san(G.Hcil.toFixed(2))+" m"]);
    }else{
      legBody.push([san("Diâmetro interno  D"),san(G.D.toFixed(2))+" m"]);
      legBody.push([san("Altura cilíndrica  H"),san(G.Hcil.toFixed(2))+" m"]);
    }
    legBody.push([san((G.tipo==="ret"?"Altura da tremonha  hc":"Altura da moega (tremonha)  hc")),san(G.hc.toFixed(2))+" m"]);
    legBody.push([san("Altura total  Htot"),san(G.Htot.toFixed(2))+" m"]);
    legBody.push([san("Lado da boca de descarga  B"),san(String(Math.round(G.Brec*1000)))+" mm"]);
    legBody.push([san("Ângulo da moega (com a horizontal)"),san(G.alfa.toFixed(0))+"°"]);
    legBody.push([san("Volume útil de armazenagem"),san(G.Vutil.toFixed(1))+" m³"]);
    legBody.push([san((G.tipo==="ret"?"Espessura da chapa da parede":"Espessura da chapa do corpo")),san(G.tcom.toFixed(1))+" mm"]);
    legBody.push([san((G.tipo==="ret"?"Espessura da chapa da tremonha":"Espessura da chapa da moega")),san(G.thopcom.toFixed(1))+" mm"]);
    legBody.push([san("Aço estrutural  fy"),G.fy+" MPa"]);
    doc.autoTable({startY:botY+16,theme:"grid",margin:{left:14,right:14},
      head:[["Medida resultante do cálculo","Valor"]],
      body:legBody,
      headStyles:{fillColor:[22,38,60],textColor:255,fontSize:9},bodyStyles:{fontSize:8.5},
      alternateRowStyles:{fillColor:[244,247,250]},
      columnStyles:{0:{cellWidth:120},1:{cellWidth:62,halign:"right",fontStyle:"bold"}}});
    doc.setFontSize(7); doc.setTextColor(110);
    doc.text(san("Croqui esquemático (fora de escala) — medidas resultantes do pré-dimensionamento."),14,doc.lastAutoTable.finalY+6);
    }
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text("ProjectARK Engenharia · Dimensionamento de Equipamentos",14,290);
  }
  doc.save("ProjectARK-"+CUR_EQ.calculadora+".pdf");
}
function closeModal(){$("#modal").classList.remove("open");}
$("#burger").addEventListener("click",openDrawer);
$("#overlay").addEventListener("click",closeDrawer);
$("#modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeModal();closeDrawer();}});

fetch("equipamentos.json?t="+Date.now(),{cache:"no-store"}).then(r=>r.json()).then(d=>{
  DB=d;
  $("#htag").innerHTML="Versão "+d.meta.versao+"<br>"+d.equipamentos.length+" equipamento(s)";
  $("#foot").textContent="ProjectARK · Pré-dimensionamento de Equipamentos · v"+d.meta.versao;
  buildMenu();render();
}).catch(()=>{$("#grid").innerHTML='<p style="color:#b33">Erro ao carregar equipamentos.json — abra via servidor (GitHub Pages).</p>';});
</script>
